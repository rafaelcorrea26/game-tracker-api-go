basePath: /
definitions:
  handlers.LoginInput:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.RegisterInput:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  models.Game:
    properties:
      id:
        type: integer
      name:
        type: string
      notes:
        type: string
      rating:
        type: integer
      status:
        type: string
      year_completed:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: API para rastrear progresso de jogos
  title: Game Tracker API
  version: "1.0"
paths:
  /games:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Game'
            type: array
      security:
      - BearerAuth: []
      summary: Lista jogos do usuário
      tags:
      - games
    post:
      consumes:
      - application/json
      parameters:
      - description: Jogo
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.Game'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cria um jogo
      tags:
      - games
  /games/{id}:
    delete:
      description: Remove um jogo pelo ID
      parameters:
      - description: ID do jogo
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deleta um jogo
      tags:
      - games
  /login:
    post:
      consumes:
      - application/json
      description: Retorna um token JWT
      parameters:
      - description: Credenciais
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login do usuário
      tags:
      - auth
  /register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados do usuário
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Criar usuário
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
